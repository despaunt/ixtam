<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="assets/img/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <title>Авторизация</title>
</head>

<header>
    <div class="container header-container">
        <div class="logo">
            <div class="logo-placeholder">
                <a href="index.html"><img src="assets/img/logo.png" alt="Экстам"></a>
            </div>
            <div class="logo-text">
            </div>
        </div>

        <div class="search-wrapper">
            <form class="search-form" id="searchForm">
                <input type="text" placeholder="Поиск запчастей по артикулу или названию..." id="searchInput">
                <button type="submit"><i class="fas fa-search"></i></button>
            </form>
        </div>

        <div class="phone">
            <a href="tel:+79999999999">+7 999 999 99 99</a>
        </div>

        <div class="user-actions">
            <a href="auth.html" id="loginButton">
                <i class="far fa-user"></i>
                <span>Войти</span>
            </a>

            <button id="logoutButton" style="display:none;">
                <i class="fas fa-right-from-bracket"></i>
                <span>Выйти</span>
            </button>
            <a href="cart.html"><i class="fas fa-shopping-cart"></i><span>Корзина</span></a>
        </div>

        <div class="burger-menu" id="burgerMenu">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <nav class="navbar" id="navbar">
        <div class="container">
            <ul class="nav-menu">
                <li><a href="index.html" class="active">Главная</a></li>
                <li><a href="category.html">Каталог запчастей</a></li>
                <li><a href="about.html">О компании</a></li>
                <li><a href="contacts.html">Контакты</a></li>
            </ul>
        </div>
    </nav>
</header>

<div class="auth-container">

    <div class="auth-box">

        <div class="auth-switch">
            <button class="active" id="loginBtn">Вход</button>
            <button id="registerBtn">Регистрация</button>
        </div>

        <form id="loginForm" class="auth-form">

            <h2>Вход</h2>

            <input type="email" id="loginEmail" placeholder="Email">

            <input type="password" id="loginPassword" placeholder="Пароль">

            <button type="submit" class="auth-button">Войти</button>

        </form>


        <form id="registerForm" class="auth-form hidden">

            <h2>Регистрация</h2>

            <input type="text" id="registerName" placeholder="Имя">

            <input type="email" id="registerEmail" placeholder="Email">

            <input type="password" id="registerPassword" placeholder="Пароль">

            <button type="submit" class="auth-button">Зарегистрироваться</button>

        </form>

    </div>

</div>
    <footer class="footer">
        <div class="container footer-container">

            <div class="footer-column">
                <h3>Компания</h3>
                <ul>
                    <li><a href="index.html">Главная</a></li>
                    <li><a href="about.html">О компании</a></li>
                    <li><a href="contacts.html">Контакты</a></li>
                </ul>
            </div>

            <div class="footer-column">
                <h3>Покупателям</h3>
                <ul>
                    <li><a href="category.html">Каталог</a></li>
                    <li><a href="cart.html">Корзина</a></li>
                    <li><a href="profile.html">Профиль</a></li>
                </ul>
            </div>

            <div class="footer-column">
                <h3>Контакты</h3>
                <p><i class="fas fa-phone"></i> +7 999 999 99 99</p>
                <p><i class="fas fa-envelope"></i> info@example.com</p>
            </div>

        </div>

        <div class="footer-bottom">
            <div class="container">
                <p>© 2026 IXTAM. Все права защищены.</p>
            </div>
        </div>
    </footer>

<script src="assets/js/auth.js"></script>
<script src="assets/js/store.js"></script>
<script src="assets/js/user.js"></script>

</body>

</html>
